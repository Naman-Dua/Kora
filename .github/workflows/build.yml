name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # Using stable 3.12 for the cloud build

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install fastapi uvicorn opentelemetry-instrumentation-fastapi

      - name: Build Executable
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "Kora_AI" --icon "NONE" --collect-all chromadb --exclude-module PyQt5 main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Kora-AI-Windows
          path: dist/Kora_AI.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Kora_AI.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
